spring:
  application:
    name: airline-system
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/airline_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:airline_user}
    password: ${DB_PASSWORD:airline_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:5J2k9sD8f3hK1l4sJ6hG9f8d7s6a5p4o3i2u1yT7r6e5w4q3Q2w1E3r4T5y6U7i8O9p0}
    expiration-ms: ${JWT_EXPIRATION:86400000}       # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

# Amadeus Real-Time Flight Pricing API
# Sign up free at https://developers.amadeus.com/
amadeus:
  api-key: ${AMADEUS_API_KEY:}
  api-secret: ${AMADEUS_API_SECRET:}
  environment: ${AMADEUS_ENV:test}  # 'test' for sandbox, 'production' for live data
